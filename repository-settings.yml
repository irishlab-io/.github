---
# Default repository settings applied during onboarding and org-wide sync
# Applied via the GitHub API to all organization repositories

merge_strategy:
  # Only squash merges are allowed to keep a linear history on main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false

branch_management:
  # Automatically delete head branches after pull request merge
  delete_branch_on_merge: true

features:
  # Disable unused features to keep repositories clean
  has_wiki: false
  has_projects: false

security:
  # Enable Dependabot vulnerability alerts for all repositories
  enable_vulnerability_alerts: true
