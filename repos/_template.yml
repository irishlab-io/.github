---
# ── REQUIRED ─────────────────────────────────────────────────────────────────
# Repository name (must match this file's name without the .yml extension).
# Follow the org naming convention:  svc-|lib-|infra-|sandbox-
name: ""

# Short one-line description shown on the GitHub repository page.
description: ""

# Visibility: private | internal | public
# Default is private. Use internal for cross-org repos in GitHub Enterprise.
visibility: private

# ── CLASSIFICATION ────────────────────────────────────────────────────────────
# Repository type. Controls naming convention validation and team defaults.
# Options: svc | lib | infra | sandbox
type: svc

# Owning team (must already exist in the org, e.g. backend, platform, frontend)
team: ""

# ── OPTIONAL ─────────────────────────────────────────────────────────────────
# GitHub topics (max 20). Lowercase, hyphens only.
topics: []
#  - python
#  - api
#  - fastapi

# Optional: bootstrap from an existing template repository in the org.
# Leave empty to start from scratch (auto-initialized with a default README).
template: ""
#  template: irishlab-io/template-python-service

# ── DEFAULT BRANCH ────────────────────────────────────────────────────────────
# Name of the repository's default branch.
# Org default: main
default_branch: main

# ── MERGE STRATEGY ────────────────────────────────────────────────────────────
# Controls which merge methods are allowed for pull requests.
# Org defaults enforce squash-only merges to keep a linear history on main.
merge_strategy:
  # Allow squash merging (combines all commits into one).
  allow_squash_merge: true
  # Allow regular merge commits (creates a merge commit).
  allow_merge_commit: false
  # Allow rebase merging (replays commits on top of base branch).
  allow_rebase_merge: false
  # Title format for squash merge commits.
  # Options: PR_TITLE | COMMIT_OR_PR_TITLE
  squash_merge_commit_title: PR_TITLE
  # Body format for squash merge commits.
  # Options: PR_BODY | COMMIT_MESSAGES | BLANK
  squash_merge_commit_message: PR_BODY

# ── BRANCH MANAGEMENT ────────────────────────────────────────────────────────
# Controls branch lifecycle settings.
branch_management:
  # Automatically delete the head branch after a pull request is merged.
  # Org default: true
  delete_branch_on_merge: true

# ── FEATURES ─────────────────────────────────────────────────────────────────
# Enable or disable optional GitHub features.
# These can be changed after creation via the org-wide sync.
features:
  wiki: false
  projects: false
  discussions: false

# ── SECURITY ─────────────────────────────────────────────────────────────────
# Security and analysis features for this repository.
# Org defaults enable all alerts; set to false to opt a repo out.
security:
  # Receive alerts for known vulnerabilities in your dependencies (Dependabot).
  vulnerability_alerts: true
  # Enable GitHub Secret Scanning to detect accidentally committed secrets.
  secret_scanning: true
  # Block pushes that contain detected secrets (requires secret_scanning: true).
  secret_scanning_push_protection: true

# ── GIT WORKFLOW ─────────────────────────────────────────────────────────────
# Declares the branching strategy used by this repository.
# This value is automatically published as a GitHub Custom Property
# (git_workflow) and drives which rulesets and CI gates are applied during
# onboarding and org-wide sync.
#
# Supported options:
#
#   github-flow    — GitHub Flow (org default).
#                    All work is done in short-lived feature branches that are
#                    merged into main via a squash-merge pull request.
#                    Simple linear history; no long-lived branches.
#                    Ruleset profile: squash-only PR required on main, tag
#                    protection enforcing semantic versioning.
#
#   trunk          — Trunk-based development.
#                    Engineers commit directly to main (or via very short-lived
#                    branches < 1 day). Requires a mature CI pipeline and
#                    feature-flag infrastructure.
#                    Ruleset profile: same as github-flow but with stricter
#                    commit signing requirements; no release/* branches.
#
#   gitflow        — Git Flow.
#                    Maintains two long-lived branches: main (stable releases)
#                    and develop (integration). Short-lived feature/*, release/*,
#                    and hotfix/* branches are merged via merge commits.
#                    Ruleset profile: branch protection on both main and develop;
#                    merge commits allowed; tag pattern vX.Y.Z.
#
#   release-branch — Release-branch model.
#                    Each minor version ships from a dedicated release/X.Y
#                    branch kept alive for backports. Used for libraries and
#                    products that maintain multiple major versions in parallel.
#                    Ruleset profile: branch protection on main and all
#                    release/* branches; tag pattern vX.Y.Z.
git_workflow: github-flow

# ── RULESETS ─────────────────────────────────────────────────────────────────
# Controls which org-standard rulesets are applied to this repository.
# The git_workflow field above influences which ruleset profile is selected.
# Set to false to skip applying a ruleset (e.g. for experimental sandboxes).
rulesets:
  # Apply the org standard branch protection ruleset (targets: main).
  branch: true
  # Apply the org standard tag protection ruleset (targets: all tags).
  tag: true

# ── CUSTOM PROPERTIES ────────────────────────────────────────────────────────
# Key/value pairs published as GitHub Custom Properties on this repository.
# The workflow calls PATCH /repos/{org}/{repo}/properties/values with these.
# Custom properties can be used as conditions in org-level rulesets (GitHub
# Enterprise Cloud) to target rules only at repos matching specific values.
# Note: git_workflow is published automatically from the field above; it does
# not need to be repeated here.
#
# Pre-defined org custom property schemas (name → type → allowed values):
#
#   git_workflow   single_select  github-flow | trunk | gitflow | release-branch
#   environment    single_select  production | staging | development | sandbox
#   service_tier   single_select  tier-1 | tier-2 | tier-3
#
# tier-1  = business-critical, customer-facing, on-call backed
# tier-2  = internal services and standard products
# tier-3  = tools, scripts, and experimental work
custom_properties:
  environment: development    # production | staging | development | sandbox
  service_tier: tier-2        # tier-1 (critical) | tier-2 (standard) | tier-3 (internal)

# ── DEPENDABOT ────────────────────────────────────────────────────────────────
# Controls whether the org's standard Dependabot configuration is synced.
dependabot:
  # Sync the org's dependabot-template.yml to .github/dependabot.yml on creation.
  enabled: true

# ── NOTES ─────────────────────────────────────────────────────────────────────
# Free-text notes visible in the PR only (not applied to the repository).
notes: ""
