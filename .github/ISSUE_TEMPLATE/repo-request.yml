---
name: Repository Request
description: Request the creation of a new repository in the organization.
title: "[Repo Request] "
labels:
  - repo-request
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a new repository.
        Once you submit this issue an automated workflow will generate the
        configuration file, open a Pull Request for review, and close this
        issue when the PR is merged.

        > **Naming convention:** `svc-` · `lib-` · `infra-` · `sandbox-`

  - type: input
    id: name
    attributes:
      label: Repository Name
      description: Must follow the org naming convention and match the file name that will be created under `repos/`.
      placeholder: svc-payments-api
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: Short one-line description shown on the GitHub repository page.
      placeholder: Payments API service
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Repository Type
      description: Controls naming-convention validation and team defaults.
      options:
        - svc
        - lib
        - infra
        - sandbox
    validations:
      required: true

  - type: input
    id: team
    attributes:
      label: Owning Team
      description: Must already exist in the GitHub organization (e.g. backend, platform, frontend).
      placeholder: backend
    validations:
      required: true

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      options:
        - private
        - internal
        - public
    validations:
      required: true

  - type: input
    id: topics
    attributes:
      label: Topics
      description: Comma-separated list of topics. Lowercase, hyphens only, max 20.
      placeholder: python, api, fastapi

  - type: input
    id: template
    attributes:
      label: Template Repository
      description: Optional — bootstrap from an existing template repository in the org. Leave blank to start from scratch.
      placeholder: irishlab-io/template-python-service

  - type: checkboxes
    id: features
    attributes:
      label: Features
      description: Enable optional GitHub features (can be changed after creation).
      options:
        - label: Enable Wiki
        - label: Enable Projects
        - label: Enable Discussions

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Free-text notes visible in the PR only (not applied to the repository).
      placeholder: Any additional context or exceptions…
