---
name: Repository Request
description: Request the creation of a new repository in the organization.
title: "[Repo Request]:"
labels:
  - repo-request
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a new repository.
        Once you submit this issue an automated workflow will generate the configuration file.
        This will open a Pull Request for review, and close this issue when the PR is merged.
        Once the PR is merged, the repository will be automatically created with the specified configuration.

  - type: dropdown
    id: type
    attributes:
      label: Organization
      description: Select the organization for the new repository.
      options:
        - irishlab-io
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Repository Type
      description: Controls naming-convention validation and team defaults.
      options:
        - management
        - product
        - project
        - social
        - test
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Repository Name
      description: Must follow the org naming convention and match the file name that will be created under `repos/`.
      placeholder: svc-payments-api
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: Short one-line description shown on the GitHub repository page.
      placeholder: Payments API service
    validations:
      required: true

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      options:
        - private
        - internal
        - public
    validations:
      required: true

  - type: input
    id: template
    attributes:
      label: Template Repository
      description: Optional — bootstrap from an existing template repository in the org. Leave blank to start from scratch.
      placeholder: irishlab-io/.github-template

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Free-text notes visible in the PR only (not applied to the repository).
      placeholder: Any additional context or exceptions…
