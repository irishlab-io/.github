---
name: CI - Organization Sync
run-name: Organization Sync on ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: Perform a dry run without making any changes
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  sync:
    name: Call Organization Sync
    permissions:
      contents: read
    uses: irishlab-io/.github/.github/workflows/reusable-org-sync.yml@main
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets: inherit
