---
name: Reusable - Python UV

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      os:
        default: ubuntu-24.04
        description: Runner OS to use for a single job
        required: false
        type: string
      os-matrix:
        default: ""
        description: JSON array of runner labels to use for a matrix build
        required: false
        type: string
      playwright-enable:
        default: false
        description: Install Playwright browsers and OS dependencies before running Pytest
        required: false
        type: boolean
      pytest-enable:
        default: true
        description: Enable Pytest for unit tests
        required: false
        type: boolean
      pytest-marker-included:
        default: ""
        description: Pytest marker expression to include, passed to pytest with -m
        required: false
        type: string
      pytest-marker-excluded:
        default: ""
        description: Pytest marker expression to exclude, merged into pytest -m as not (...)
        required: false
        type: string
      python-version:
        default: "3.14"
        description: Python version to use for a single job
        required: false
        type: string
      python-version-matrix:
        default: ""
        description: JSON array of Python versions to use for a matrix build
        required: false
        type: string
      uv-cache:
        default: true
        description: Enable UV cache
        required: false
        type: boolean
      uv-version:
        default: "latest"
        description: UV version to use
        required: false
        type: string
      working_directory:
        default: ""
        description: Project working directory
        required: false
        type: string

jobs:
  build:
    name: Build & Unit Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ inputs.os-matrix != '' && fromJSON(inputs.os-matrix) || fromJSON(format('["{0}"]', inputs.os)) }}
        python-version: ${{ inputs.python-version-matrix != '' && fromJSON(inputs.python-version-matrix) || fromJSON(format('["{0}"]', inputs.python-version)) }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install UV
        uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v6.4.1
        with:
          enable-cache: ${{ inputs.uv-cache }}
          cache-dependency-glob: "uv.lock"
          version: ${{ inputs.uv-version }}

      - name: Setup Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev --frozen
          if [[ "${{ inputs.pytest-enable }}" == 'true' && "${{ inputs.playwright-enable }}" == 'true' ]]; then
            uv run playwright install --with-deps
          fi
        shell: bash

      - name: Build project
        id: build
        run: |
          uv build
        shell: bash

      - name: Run Pytest
        if: ${{ inputs.pytest-enable }}
        id: pytest
        run: |
          include_markers='${{ inputs.pytest-marker-included }}'
          exclude_markers='${{ inputs.pytest-marker-excluded }}'

          pytest_args=()

          if [[ -n "$include_markers" && -n "$exclude_markers" ]]; then
            pytest_args+=("-m" "($include_markers) and not ($exclude_markers)")
          elif [[ -n "$include_markers" ]]; then
            pytest_args+=("-m" "$include_markers")
          elif [[ -n "$exclude_markers" ]]; then
            pytest_args+=("-m" "not ($exclude_markers)")
          fi

          uv run pytest "${pytest_args[@]}"
        shell: bash

      - name: Minimize UV cache
        run: |
          uv cache prune --ci
        shell: bash
