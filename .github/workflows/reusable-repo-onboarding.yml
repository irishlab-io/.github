---
name: Reusable - Repository Onboarding

on: # yamllint disable-line rule:truthy
  # repository_dispatch:
  #   types:
  #     - repository-created
  workflow_call:
    inputs:
      repo_name:
        description: Name of the repository to onboard
        required: true
        type: string
    secrets:
      IRISHLAB_BOT_APP_ID:
        required: true
        description: GitHub App ID for bot authentication
      IRISHLAB_BOT_PRIVATE_KEY:
        required: true
        description: GitHub App private key for bot authentication

jobs:
  onboard:
    name: Onboard ${{ inputs.repo_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: "${{ secrets.IRISHLAB_BOT_APP_ID }}"
          private-key: "${{ secrets.IRISHLAB_BOT_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Call Repository Onboarding Action
        id: repo-onboarding
        uses: irishlab-io/.github/.github/actions/repo-onboarding@main
