---
name: Reusable - Bitwarden Secret Deploy

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      secrets:
        description: |
          Newline-separated list of Bitwarden secret UUIDs to fetch.
          Format per line: <bitwarden-secret-uuid> > VARIABLE_NAME
        required: true
        type: string
      format:
        description: |
          Output format for the rendered secrets file.
          Supported values:
            env          – KEY=VALUE dotenv file
            json         – {"KEY": "value"} JSON object
            yaml         – KEY: value YAML mapping
            k8s-secret   – Kubernetes Secret manifest (values are base64-encoded)
            k8s-configmap – Kubernetes ConfigMap manifest (plain-text values)
            raw          – Single raw secret value written to a plain text file
        required: true
        type: string
      output_file:
        description: |
          Filename (no path) for the rendered secrets artifact.
          Defaults based on format: .env / secrets.json / secrets.yaml /
          k8s-secret.yaml / k8s-configmap.yaml / secret.txt
        required: false
        type: string
        default: ""
      artifact_name:
        description: Name of the GitHub Actions artifact to upload.
        required: false
        type: string
        default: "bitwarden-secret-deploy"
      artifact_retention_days:
        description: Number of days to retain the uploaded artifact.
        required: false
        type: number
        default: 1
      k8s_name:
        description: |
          Name for the Kubernetes Secret or ConfigMap resource.
          Only used when format is k8s-secret or k8s-configmap.
        required: false
        type: string
        default: "app-secrets"
      k8s_namespace:
        description: |
          Kubernetes namespace for the Secret or ConfigMap resource.
          Only used when format is k8s-secret or k8s-configmap.
        required: false
        type: string
        default: "default"
      k8s_apply:
        description: |
          When true and KUBECONFIG secret is provided, apply the rendered
          k8s-secret or k8s-configmap manifest to the cluster after rendering.
        required: false
        type: boolean
        default: false
    secrets:
      BW_ACCESS_TOKEN:
        required: true
        description: Bitwarden Secrets Manager machine account access token
      KUBECONFIG:
        required: false
        description: |
          Base64-encoded kubeconfig for kubectl apply.
          Required only when k8s_apply is true.
    outputs:
      artifact_name:
        description: Name of the artifact containing the rendered secrets file.
        value: ${{ jobs.deploy.outputs.artifact_name }}
      output_file:
        description: Filename of the rendered secrets file within the artifact.
        value: ${{ jobs.deploy.outputs.output_file }}

jobs:
  deploy:
    name: Deploy Bitwarden Secrets (${{ inputs.format }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      output_file: ${{ steps.meta.outputs.output_file }}

    steps:
      - name: Resolve output metadata
        id: meta
        env:
          FORMAT: ${{ inputs.format }}
          OUTPUT_FILE: ${{ inputs.output_file }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail

          case "${FORMAT}" in
            env)            default_file=".env" ;;
            json)           default_file="secrets.json" ;;
            yaml)           default_file="secrets.yaml" ;;
            k8s-secret)     default_file="k8s-secret.yaml" ;;
            k8s-configmap)  default_file="k8s-configmap.yaml" ;;
            raw)            default_file="secret.txt" ;;
            *)
              echo "::error::Unsupported format '${FORMAT}'. Choose from: env, json, yaml, k8s-secret, k8s-configmap, raw"
              exit 1
              ;;
          esac

          file="${OUTPUT_FILE:-${default_file}}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "output_file=${file}"            >> "${GITHUB_OUTPUT}"
          echo "resolved_file=${file}"          >> "${GITHUB_OUTPUT}"
        shell: bash

      - name: Install Bitwarden Secrets Manager CLI
        env:
          BWS_VERSION: "2.0.0"
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws-bin
          sudo install -m 755 /tmp/bws-bin/bws /usr/local/bin/bws
          bws --version
        shell: bash

      - name: Fetch secrets and render output file
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          FORMAT: ${{ inputs.format }}
          SECRETS_INPUT: ${{ inputs.secrets }}
          OUTPUT_FILE: ${{ steps.meta.outputs.resolved_file }}
          K8S_NAME: ${{ inputs.k8s_name }}
          K8S_NAMESPACE: ${{ inputs.k8s_namespace }}
        run: |
          set -euo pipefail

          tmp_dir=$(mktemp -d)
          declare -a key_order
          fetch_failures=()

          while IFS= read -r line; do
            line="${line#"${line%%[! ]*}"}"
            line="${line%"${line##*[! ]}"}"
            [[ -z "${line}" ]] && continue

            # Use parameter expansion to split on first ' > ' occurrence only
            bw_id="${line%% > *}"
            var_name="${line#* > }"

            if [[ -z "${bw_id}" || -z "${var_name}" || "${bw_id}" == "${line}" ]]; then
              echo "::warning::Skipping malformed secret entry (expected '<uuid> > NAME'): ${line}"
              continue
            fi

            # Validate UUID format
            if ! [[ "${bw_id}" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
              echo "::warning::Skipping entry with invalid Bitwarden UUID '${bw_id}'"
              continue
            fi

            # Validate variable name (POSIX-safe identifier)
            if ! [[ "${var_name}" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::warning::Skipping entry with invalid variable name '${var_name}'"
              continue
            fi

            echo "Fetching Bitwarden secret ${bw_id} → ${var_name}..."
            bws_stderr=$(mktemp)
            secret_value=$(bws secret get "${bw_id}" 2>"${bws_stderr}" | jq -r '.value' || true)
            if [[ -z "${secret_value}" || "${secret_value}" == "null" ]]; then
              bws_error=$(<"${bws_stderr}")
              echo "::warning::Could not retrieve Bitwarden secret ${bw_id}: ${bws_error:-unknown error}"
              fetch_failures+=("${var_name}")
              rm -f "${bws_stderr}"
              continue
            fi
            rm -f "${bws_stderr}"

            # Write value to individual temp file — avoids shell-escaping secret values
            printf '%s' "${secret_value}" > "${tmp_dir}/${var_name}"
            key_order+=("${var_name}")
          done <<< "${SECRETS_INPUT}"

          if [[ ${#fetch_failures[@]} -gt 0 ]]; then
            echo "::error::Failed to fetch ${#fetch_failures[@]} secret(s): ${fetch_failures[*]}"
            rm -rf "${tmp_dir}"
            exit 1
          fi

          if [[ ${#key_order[@]} -eq 0 ]]; then
            echo "::error::No secrets were successfully fetched — nothing to render."
            rm -rf "${tmp_dir}"
            exit 1
          fi

          # Write ordered key list for Python consumption
          printf '%s\n' "${key_order[@]}" > "${tmp_dir}/__keys__"

          mkdir -p "$(dirname "${OUTPUT_FILE}")"

          # Write Python render script to a temp file via heredoc.
          # YAML strips the 10-space common indent from every line, so the
          # heredoc content arrives at Python with correct module-level indentation.
          render_py="${tmp_dir}/render.py"
          cat > "${render_py}" << 'PYEOF'
          import sys, os, pathlib, json, base64, re
          tmp = sys.argv[1]
          out_file = sys.argv[2]
          fmt = sys.argv[3]
          k8s_name = sys.argv[4]
          k8s_ns = sys.argv[5]
          keys = pathlib.Path(os.path.join(tmp, '__keys__')).read_text().splitlines()
          kv = {k: pathlib.Path(os.path.join(tmp, k)).read_text() for k in keys}
          # Validate k8s resource names: DNS subdomain (RFC 1123)
          k8s_re = re.compile(r'^[a-z0-9]([a-z0-9\-]{0,251}[a-z0-9])?$')
          if fmt in ('k8s-secret', 'k8s-configmap') and not k8s_re.match(k8s_name):
              print(f'::error::k8s_name {k8s_name!r} must be lowercase alphanumeric and hyphens only.', file=sys.stderr)
              sys.exit(1)
          if fmt == 'env':
              with open(out_file, 'w') as f:
                  for k in keys:
                      v = kv[k]
                      if any(c in v for c in ['\n', '\r', '"', '\\']):
                          escaped = v.replace('\\', '\\\\').replace('"', '\\"').replace('\r', '\\r').replace('\n', '\\n')
                          f.write(f'{k}="{escaped}"\n')
                      else:
                          f.write(f'{k}={v}\n')
          elif fmt == 'json':
              with open(out_file, 'w') as f:
                  json.dump({k: kv[k] for k in keys}, f, indent=2, ensure_ascii=False)
                  f.write('\n')
          elif fmt == 'yaml':
              import yaml
              with open(out_file, 'w') as f:
                  yaml.safe_dump({k: kv[k] for k in keys}, f, default_flow_style=False, allow_unicode=True)
          elif fmt == 'k8s-secret':
              import yaml
              doc = {
                  'apiVersion': 'v1', 'kind': 'Secret',
                  'metadata': {'name': k8s_name, 'namespace': k8s_ns},
                  'type': 'Opaque',
                  'data': {k: base64.b64encode(kv[k].encode()).decode() for k in keys},
              }
              pathlib.Path(out_file).write_text(yaml.safe_dump(doc, default_flow_style=False, allow_unicode=True))
          elif fmt == 'k8s-configmap':
              import yaml
              doc = {
                  'apiVersion': 'v1', 'kind': 'ConfigMap',
                  'metadata': {'name': k8s_name, 'namespace': k8s_ns},
                  'data': {k: kv[k] for k in keys},
              }
              pathlib.Path(out_file).write_text(yaml.safe_dump(doc, default_flow_style=False, allow_unicode=True))
          elif fmt == 'raw':
              if len(keys) > 1:
                  print(f'::error::format=raw requires exactly one secret; {len(keys)} were provided.', file=sys.stderr)
                  sys.exit(1)
              pathlib.Path(out_file).write_text(kv[keys[0]])
          else:
              print(f'::error::Unsupported format: {fmt}', file=sys.stderr)
              sys.exit(1)
          PYEOF

          python3 "${render_py}" "${tmp_dir}" "${OUTPUT_FILE}" "${FORMAT}" \
            "${K8S_NAME}" "${K8S_NAMESPACE}"

          rm -rf "${tmp_dir}"
          echo "Rendered ${#key_order[@]} secret(s) to ${OUTPUT_FILE} (format: ${FORMAT})"
        shell: bash

      - name: Apply k8s manifest to cluster
        if: inputs.k8s_apply && (inputs.format == 'k8s-secret' || inputs.format == 'k8s-configmap')
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
          OUTPUT_FILE: ${{ steps.meta.outputs.resolved_file }}
        run: |
          set -euo pipefail

          if [[ -z "${KUBECONFIG_B64:-}" ]]; then
            echo "::error::k8s_apply is true but KUBECONFIG secret is not set."
            exit 1
          fi

          tmp_kubeconfig=$(mktemp)
          printf '%s' "${KUBECONFIG_B64}" | base64 -d > "${tmp_kubeconfig}"
          export KUBECONFIG="${tmp_kubeconfig}"

          kubectl apply -f "${OUTPUT_FILE}"
          echo "Manifest applied successfully."
          rm -f "${tmp_kubeconfig}"
        shell: bash

      - name: Upload rendered secrets artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.resolved_file }}
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
