---
name: Reusable - Terraform Plan

# REUSABLE WORKFLOW with INPUTS
# to keep this workflow simple, assumptions are made:
# - uses AWS S3 backend for tfstate storage with DynamoDB for state locking
# - uses OIDC-based AWS authentication (no long-lived credentials)
# - posts a PR comment with a summary table and the full terraform plan output
# - plan output posted to PR is truncated when it exceeds the GitHub comment limit

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      aws-region:
        description: AWS region used for OIDC authentication and the S3 backend
        required: false
        default: eu-west-1
        type: string
      backend-config:
        description: |
          Backend configuration values, one per line in key=value format.
          Each non-empty line is forwarded as a separate -backend-config flag to terraform init.
          Example:
            bucket=my-tfstate-bucket
            key=envs/prod/terraform.tfstate
            dynamodb_table=my-tfstate-lock
        required: false
        default: ""
        type: string
      environment:
        description: GitHub environment name — enables deployment protection rules when set
        required: false
        default: ""
        type: string
      terraform-var-file:
        description: Path to a .tfvars file relative to working-directory
        required: false
        default: ""
        type: string
      terraform-version:
        description: Terraform version to install (e.g. "1.11.0" or "latest")
        required: false
        default: latest
        type: string
      working-directory:
        description: Directory containing the terraform configuration files
        required: false
        default: "."
        type: string

    secrets:
      AWS_ROLE_ARN:
        description: IAM role ARN to assume via OIDC for AWS authentication
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:

  terraform-plan:

    name: Terraform - Plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -no-color
        shell: bash
        continue-on-error: true

      - name: Terraform Init
        id: init
        env:
          TF_BACKEND_CONFIG: ${{ inputs.backend-config }}
        run: |
          tf_init_args=""
          while IFS= read -r config; do
            [[ -z "${config}" ]] && continue
            tf_init_args="${tf_init_args} -backend-config=${config}"
          done <<< "${TF_BACKEND_CONFIG}"
          # shellcheck disable=SC2086
          terraform init -no-color ${tf_init_args}
        shell: bash

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        shell: bash

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_FILE: ${{ inputs.terraform-var-file }}
        run: |
          tf_plan_args="-no-color -out=tfplan"
          if [[ -n "${TF_VAR_FILE}" ]]; then
            tf_plan_args="${tf_plan_args} -var-file=${TF_VAR_FILE}"
          fi
          # shellcheck disable=SC2086
          terraform plan ${tf_plan_args} 2>&1 | tee "${RUNNER_TEMP}/terraform-plan.txt"
          TF_EXIT_CODE="${PIPESTATUS[0]}"
          echo "exitcode=${TF_EXIT_CODE}" >> "${GITHUB_OUTPUT}"
          exit "${TF_EXIT_CODE}"
        shell: bash
        continue-on-error: true

      - name: Post Plan Comment to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const maxLength = 60000;

            const statusIcon = (outcome) => outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';

            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan     = '${{ steps.plan.outcome }}';

            let planOutput = '';
            try {
              planOutput = fs.readFileSync(process.env.RUNNER_TEMP + '/terraform-plan.txt', 'utf8').trim();
            } catch (e) {
              planOutput = 'Plan output unavailable — see workflow logs for details.';
            }

            if (planOutput.length > maxLength) {
              planOutput = '... (truncated — see workflow logs for full output)\n\n' +
                           planOutput.substring(planOutput.length - maxLength);
            }

            const workdir     = '${{ inputs.working-directory }}';
            const environment = '${{ inputs.environment }}';
            const envLabel    = environment ? ` (\`${environment}\`)` : '';
            const marker      = `<!-- tf-plan:${workdir} -->`;

            const lines = [
              marker,
              `#### 🏗️ Terraform Plan — \`${workdir}\`${envLabel}`,
              '',
              '| Step | Status |',
              '|---|---|',
              `| 📐 Format | ${statusIcon(fmt)} \`${fmt}\` |`,
              `| ⚙️ Init | ${statusIcon(init)} \`${init}\` |`,
              `| 🔍 Validate | ${statusIcon(validate)} \`${validate}\` |`,
              `| 📋 Plan | ${statusIcon(plan)} \`${plan}\` |`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```hcl',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              '> [!NOTE]',
              `> Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\``,
            ];
            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "::error::Terraform plan failed. Review the plan output above."
          exit 1
        shell: bash
