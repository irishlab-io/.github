---
name: Reusable - Update flux

on: # yamllint disable-line rule:truthy
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flux:
    name: Update flux
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@ca29bb1a41d662495cbf3a8ee6dba7f088ae7310 # v2.7.1

      - name: Check Flux for updates
        id: update
        run: |
          flux install --export > ./k8s/cluster/base/flux-system/gotk-components.yaml

          VERSION="$(flux -v)"

          echo flux_version="$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-flux
          commit-message: Update to ${{ steps.update.outputs.flux_version }}
          title: Update to ${{ steps.update.outputs.flux_version }}
          body: ${{ steps.update.outputs.flux_version }}
