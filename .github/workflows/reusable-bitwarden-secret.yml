---
name: Reusable - Bitwarden Secret Sync

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      repo_name:
        description: |
          Target repository name for repo-level secrets (repository name only, not owner/repo).
          Required when repo_secrets is provided.
        required: false
        type: string
        default: ""
      org_secrets:
        description: |
          Newline-separated list of Bitwarden secret UUIDs to sync as org-level GitHub secrets.
          Format per line: <bitwarden-secret-uuid> > GITHUB_SECRET_NAME
        required: false
        type: string
        default: ""
      repo_secrets:
        description: |
          Newline-separated list of Bitwarden secret UUIDs to sync as repo-level GitHub secrets.
          Format per line: <bitwarden-secret-uuid> > GITHUB_SECRET_NAME
        required: false
        type: string
        default: ""
    secrets:
      BW_ACCESS_TOKEN:
        required: true
        description: Bitwarden Secrets Manager machine account access token
      IRISHLAB_BOT_APP_ID:
        required: true
        description: GitHub App ID for bot authentication
      IRISHLAB_BOT_PRIVATE_KEY:
        required: true
        description: GitHub App private key for bot authentication

jobs:
  sync:
    name: Sync Bitwarden Secrets to GitHub
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: generate-token
        with:
          app-id: "${{ secrets.IRISHLAB_BOT_APP_ID }}"
          private-key: "${{ secrets.IRISHLAB_BOT_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Fetch secrets from Bitwarden Secrets Manager
        if: inputs.org_secrets != '' || inputs.repo_secrets != ''
        uses: bitwarden/sm-action@14f92f1d294ae3c2b6a3845d389cd2c318b0dfd8 # v2.2.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ inputs.org_secrets }}
            ${{ inputs.repo_secrets }}

      - name: Sync org-level secrets to GitHub
        if: inputs.org_secrets != ''
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          ORG_SECRETS: ${{ inputs.org_secrets }}
        run: |
          set -euo pipefail

          failures=()

          while IFS= read -r line; do
            line=$(echo "$line" | xargs 2>/dev/null || true)
            [[ -z "$line" ]] && continue

            # Format: "<bitwarden-uuid> > GITHUB_SECRET_NAME"
            github_name=$(echo "$line" | sed 's/^[^>]* > //' | xargs)
            if [[ -z "$github_name" ]]; then
              echo "::warning::Skipping malformed secrets entry: ${line}"
              continue
            fi

            value=$(printenv "${github_name}" 2>/dev/null || true)
            if [[ -z "$value" ]]; then
              echo "::warning::No value found for Bitwarden secret mapped to ${github_name}"
              failures+=("${github_name}")
              continue
            fi

            echo "Setting org secret ${github_name}..."
            printf '%s' "${value}" | gh secret set "${github_name}" --org "${ORG}"
            echo "  Done."
          done <<< "${ORG_SECRETS}"

          if [[ ${#failures[@]} -gt 0 ]]; then
            echo "::error::Failed to set ${#failures[@]} org secret(s): ${failures[*]}"
            exit 1
          fi
        shell: bash

      - name: Sync repo-level secrets to GitHub
        if: inputs.repo_secrets != '' && inputs.repo_name != ''
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          REPO_NAME: ${{ inputs.repo_name }}
          REPO_SECRETS: ${{ inputs.repo_secrets }}
        run: |
          set -euo pipefail

          failures=()

          while IFS= read -r line; do
            line=$(echo "$line" | xargs 2>/dev/null || true)
            [[ -z "$line" ]] && continue

            # Format: "<bitwarden-uuid> > GITHUB_SECRET_NAME"
            github_name=$(echo "$line" | sed 's/^[^>]* > //' | xargs)
            if [[ -z "$github_name" ]]; then
              echo "::warning::Skipping malformed secrets entry: ${line}"
              continue
            fi

            value=$(printenv "${github_name}" 2>/dev/null || true)
            if [[ -z "$value" ]]; then
              echo "::warning::No value found for Bitwarden secret mapped to ${github_name}"
              failures+=("${github_name}")
              continue
            fi

            echo "Setting repo secret ${github_name} for ${ORG}/${REPO_NAME}..."
            printf '%s' "${value}" | gh secret set "${github_name}" --repo "${ORG}/${REPO_NAME}"
            echo "  Done."
          done <<< "${REPO_SECRETS}"

          if [[ ${#failures[@]} -gt 0 ]]; then
            echo "::error::Failed to set ${#failures[@]} repo secret(s): ${failures[*]}"
            exit 1
          fi
        shell: bash
