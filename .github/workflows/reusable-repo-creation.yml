---
name: Reusable - Repository Creation

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      repos_to_create:
        description: |
          Space-separated list of repos/*.yml config file paths to process.
          Usually the files added or modified in a push.
        required: true
        type: string
    secrets:
      IRISHLAB_BOT_APP_ID:
        required: true
        description: GitHub App ID for bot authentication
      IRISHLAB_BOT_PRIVATE_KEY:
        required: true
        description: GitHub App private key for bot authentication
      BW_ACCESS_TOKEN:
        required: false
        description: Bitwarden Secrets Manager machine account access token (required to sync secrets defined in repos/*.yml)

jobs:
  create:
    name: Create Repositories
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: generate-token
        with:
          app-id: "${{ secrets.IRISHLAB_BOT_APP_ID }}"
          private-key: "${{ secrets.IRISHLAB_BOT_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Create repositories
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          REPOS_TO_CREATE: ${{ inputs.repos_to_create }}
        run: |
          set -euo pipefail

          if [[ -z "${REPOS_TO_CREATE// /}" ]]; then
            echo "No repositories provided for creation."
            exit 0
          fi

          created=()
          updated=()
          skipped=()
          failures=()

          for config_file in ${REPOS_TO_CREATE}; do
            # Skip non-yaml files and template
            [[ ! "${config_file}" =~ \.(yml|yaml)$ ]] && continue
            [[ "$(basename "${config_file}")" == "_template.yml" ]] && continue

            if [[ ! -f "${config_file}" ]]; then
              echo "File not found: ${config_file}. Skipping."
              skipped+=("${config_file}")
              continue
            fi

            # Parse YAML config using yq-style parsing with grep/sed
            repo_name=$(grep -E '^name:' "${config_file}" | head -1 | sed 's/^name:[[:space:]]*//' | tr -d '"'"'" | xargs)
            description=$(grep -E '^description:' "${config_file}" | head -1 | sed 's/^description:[[:space:]]*//' | tr -d '"'"'" | xargs)
            visibility=$(grep -E '^visibility:' "${config_file}" | head -1 | sed 's/^visibility:[[:space:]]*//' | tr -d '"'"'" | xargs)
            team=$(grep -E '^team:' "${config_file}" | head -1 | sed 's/^team:[[:space:]]*//' | tr -d '"'"'" | xargs)
            template=$(grep -E '^template:' "${config_file}" | head -1 | sed 's/^template:[[:space:]]*//' | tr -d '"'"'" | xargs)

            # Set defaults
            visibility="${visibility:-private}"

            if [[ -z "${repo_name}" ]]; then
              echo "::error::Missing 'name' field in ${config_file}"
              failures+=("${config_file}")
              continue
            fi

            full_name="${ORG}/${repo_name}"
            echo ""
            echo "============================================================"
            echo "Processing: ${full_name}"
            echo "  config      : ${config_file}"
            echo "  description : ${description:-<none>}"
            echo "  visibility  : ${visibility}"
            echo "  team        : ${team:-<none>}"
            echo "  template    : ${template:-<none>}"

            # Check if repository already exists
            if gh repo view "${full_name}" &>/dev/null; then
              echo "  Repository already exists. Updating settings..."
              if gh api -X PATCH "/repos/${full_name}" \
                -f "description=${description}" \
                -f "visibility=${visibility}" \
                --silent 2>&1; then
                echo "  Settings updated."
                updated+=("${repo_name}")
              else
                echo "::warning::Failed to update ${full_name}"
              fi
            else
              echo "  Creating repository..."
              if [[ -n "${template}" ]]; then
                # Parse template owner/repo
                if [[ "${template}" == */* ]]; then
                  template_owner="${template%%/*}"
                  template_repo="${template#*/}"
                else
                  template_owner="${ORG}"
                  template_repo="${template}"
                fi
                is_private=$([[ "${visibility}" == "private" ]] && echo "true" || echo "false")

                if gh api -X POST "/repos/${template_owner}/${template_repo}/generate" \
                  -f "owner=${ORG}" \
                  -f "name=${repo_name}" \
                  -f "description=${description}" \
                  -F "private=${is_private}" \
                  -F "include_all_branches=false" \
                  --silent 2>&1; then
                  echo "  Repository created from template."
                  created+=("${repo_name}")
                else
                  echo "::error::Failed to create ${full_name} from template"
                  failures+=("${repo_name}")
                  continue
                fi
              else
                if gh api -X POST "/orgs/${ORG}/repos" \
                  -f "name=${repo_name}" \
                  -f "description=${description}" \
                  -f "visibility=${visibility}" \
                  -F "auto_init=true" \
                  --silent 2>&1; then
                  echo "  Repository created."
                  created+=("${repo_name}")
                else
                  echo "::error::Failed to create ${full_name}"
                  failures+=("${repo_name}")
                  continue
                fi
              fi
            fi

            # Assign team if specified
            if [[ -n "${team}" ]]; then
              echo "  Assigning team '${team}'..."
              if gh api -X PUT "/orgs/${ORG}/teams/${team}/repos/${full_name}" \
                -f "permission=maintain" \
                --silent 2>&1; then
                echo "  Team assigned."
              else
                echo "::warning::Failed to assign team '${team}'"
              fi
            fi

            echo "  Done."
          done

          # Summary
          echo ""
          echo "=== Creation Summary ==="
          [[ ${#created[@]} -gt 0 ]] && echo "Created: ${created[*]}"
          [[ ${#updated[@]} -gt 0 ]] && echo "Updated: ${updated[*]}"
          [[ ${#skipped[@]} -gt 0 ]] && echo "Skipped: ${skipped[*]}"
          [[ ${#failures[@]} -gt 0 ]] && echo "Failed: ${failures[*]}"

          if [[ ${#failures[@]} -gt 0 ]]; then
            echo "::error::Failed to process ${#failures[@]} repository(ies): ${failures[*]}"
            exit 1
          fi
        shell: bash

      - name: Trigger onboarding workflows
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          REPOS_TO_CREATE: ${{ inputs.repos_to_create }}
        run: |
          set -euo pipefail

          for config_file in ${REPOS_TO_CREATE}; do
            [[ "$(basename "${config_file}")" == "_template.yml" ]] && continue
            [[ ! -f "${config_file}" ]] && continue

            repo_name=$(grep -E '^name:' "${config_file}" | head -1 | sed 's/^name:[[:space:]]*//' | tr -d '"'"'" | xargs)
            [[ -z "${repo_name}" ]] && continue

            echo "Triggering onboarding for ${ORG}/${repo_name}..."
            if gh api -X POST "/repos/${ORG}/.github/dispatches" \
              -f "event_type=repository-created" \
              -f "client_payload[repo_name]=${repo_name}" 2>&1; then
              echo "  Onboarding triggered."
            else
              echo "::warning::Failed to trigger onboarding for ${repo_name}"
            fi
          done
        shell: bash

      - name: Install Bitwarden Secrets Manager CLI
        if: secrets.BW_ACCESS_TOKEN != ''
        env:
          BWS_VERSION: "2.0.0"
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws-bin
          sudo install -m 755 /tmp/bws-bin/bws /usr/local/bin/bws
          bws --version
        shell: bash

      - name: Sync Bitwarden Secrets to GitHub
        if: secrets.BW_ACCESS_TOKEN != ''
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          ORG: ${{ github.repository_owner }}
          REPOS_TO_CREATE: ${{ inputs.repos_to_create }}
        run: |
          set -euo pipefail

          sync_failures=()

          for config_file in ${REPOS_TO_CREATE}; do
            [[ "$(basename "${config_file}")" == "_template.yml" ]] && continue
            [[ ! -f "${config_file}" ]] && continue

            repo_name=$(grep -E '^name:' "${config_file}" | head -1 | sed 's/^name:[[:space:]]*//' | tr -d '"'"'" | xargs)
            [[ -z "${repo_name}" ]] && continue

            # Read org-level secrets (format: "<bitwarden-uuid> > GITHUB_SECRET_NAME")
            mapfile -t org_secrets < <(yq '.secrets.org // [] | .[]' "${config_file}" 2>/dev/null | tr -d '"' || true)
            # Read repo-level secrets
            mapfile -t repo_secrets < <(yq '.secrets.repo // [] | .[]' "${config_file}" 2>/dev/null | tr -d '"' || true)

            if [[ ${#org_secrets[@]} -eq 0 && ${#repo_secrets[@]} -eq 0 ]]; then
              echo "No Bitwarden secrets configured for ${repo_name}. Skipping."
              continue
            fi

            echo ""
            echo "============================================================"
            echo "Syncing secrets for: ${ORG}/${repo_name}"

            for secret_mapping in "${org_secrets[@]}"; do
              secret_mapping=$(echo "${secret_mapping}" | xargs 2>/dev/null || true)
              [[ -z "${secret_mapping}" ]] && continue

              bw_id=$(echo "${secret_mapping}" | awk -F' > ' '{print $1}')
              gh_name=$(echo "${secret_mapping}" | awk -F' > ' '{print $2}')

              if [[ -z "${bw_id}" || -z "${gh_name}" ]]; then
                echo "  ::warning::Skipping malformed org secret entry: ${secret_mapping}"
                continue
              fi

              echo "  Fetching Bitwarden secret ${bw_id} → org secret ${gh_name}..."
              secret_value=$(bws secret get "${bw_id}" 2>/dev/null | jq -r '.value' || true)
              if [[ -z "${secret_value}" || "${secret_value}" == "null" ]]; then
                echo "  ::warning::Could not retrieve value for Bitwarden secret ${bw_id}"
                sync_failures+=("${gh_name} (org)")
                continue
              fi
              printf '%s' "${secret_value}" | gh secret set "${gh_name}" --org "${ORG}"
              echo "  Org secret ${gh_name} set."
            done

            for secret_mapping in "${repo_secrets[@]}"; do
              secret_mapping=$(echo "${secret_mapping}" | xargs 2>/dev/null || true)
              [[ -z "${secret_mapping}" ]] && continue

              bw_id=$(echo "${secret_mapping}" | awk -F' > ' '{print $1}')
              gh_name=$(echo "${secret_mapping}" | awk -F' > ' '{print $2}')

              if [[ -z "${bw_id}" || -z "${gh_name}" ]]; then
                echo "  ::warning::Skipping malformed repo secret entry: ${secret_mapping}"
                continue
              fi

              echo "  Fetching Bitwarden secret ${bw_id} → repo secret ${gh_name}..."
              secret_value=$(bws secret get "${bw_id}" 2>/dev/null | jq -r '.value' || true)
              if [[ -z "${secret_value}" || "${secret_value}" == "null" ]]; then
                echo "  ::warning::Could not retrieve value for Bitwarden secret ${bw_id}"
                sync_failures+=("${gh_name} (repo)")
                continue
              fi
              printf '%s' "${secret_value}" | gh secret set "${gh_name}" --repo "${ORG}/${repo_name}"
              echo "  Repo secret ${gh_name} set."
            done

            echo "  Done."
          done

          if [[ ${#sync_failures[@]} -gt 0 ]]; then
            echo "::warning::Failed to sync ${#sync_failures[@]} secret(s): ${sync_failures[*]}"
          fi

          echo ""
          echo "Bitwarden secret sync complete."
        shell: bash
