---
name: Reusable - Hello World

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      comments:
        description: Simple string for testing purpose
        type: string
        required: false
        default: test1234
      enable:
        description: Simple boolean flag for testing purpose
        type: boolean
        required: false
        default: false
    secrets:
      TS_OAUTH_CLIENT_ID:
        description: Tailscale OAuth client ID
        required: true
      TS_OAUTH_CLIENT_SECRET:
        description: Tailscale OAuth client secret
        required: true

jobs:
  hello-world:
    name: Hello World - A testing workflow
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run a one-line script
        run: echo Hello, world!
        shell: bash

      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
        shell: bash

      - name: Run a one-line script with boolean inputs
        if: inputs.enable
        run: echo Hello, world enabled!
        shell: bash

      - name: Run a one-line script with string inputs
        if: inputs.enable
        run: echo Hello, world ${{ inputs.comments }} !
        shell: bash

      - name: Call Tailscale Action
        id: tailscale
        uses: irishlab-io/.github/.github/actions/tailscale@main
        with:
          ts-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts-client-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: "tag:ci"

      - name: Get Tailscale IP address
        run: |
          tailscale ip -4
        shell: bash
