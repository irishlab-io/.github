---
name: CI - Repository
run-name: Continuous Integration for ${{ github.repository_owner }} organization on the behalf of ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  push:
    paths:
      - repos/*.yml
  repository_dispatch:
    types:
      - repository-created
  workflow_dispatch:
    inputs:
      repo_name:
        description: Name of the repository to onboard (leave empty for pinned-actions check only)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  repo-changes:
    name: Detect Repository Config Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      config_files: ${{ steps.detect.outputs.config_files }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed repo config files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'repos/*.yml' 'repos/*.yaml' \
            | grep -v 'repos/_template.yml' || true)
          if [ -n "${CHANGED}" ]; then
            FILES=$(echo "${CHANGED}" | tr '\n' ' ' | xargs)
            echo "config_files=${FILES}" >> "${GITHUB_OUTPUT}"
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changed repo config files: ${FILES}"
          else
            echo "config_files=" >> "${GITHUB_OUTPUT}"
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No repo config changes detected."
          fi
        shell: bash

  repo-creation:
    name: Call Repository Creation
    needs:
      - repo-changes
    if: needs.repo-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
    uses: irishlab-io/.github/.github/workflows/reusable-repo-creation.yml@main
    with:
      config_files: ${{ needs.repo-changes.outputs.config_files }}
    secrets: inherit

  repo-onboarding:
    name: Call Repository Onboarding
    needs:
      - repo-creation
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.repo_name != '' ||
      github.event_name == 'repository_dispatch'
    permissions:
      contents: read
    uses: irishlab-io/.github/.github/workflows/reusable-repo-onboarding.yml@main
    with:
      repo_name: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repo_name || inputs.repo_name }}"
    secrets: inherit
