---
name: CI - Repository
run-name: Continuous Integration for ${{ github.repository_owner }} organization on the behalf of ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  repo:
    name: Call Dependabot Auto-Merge
    uses: irishlab-io/.github/.github/workflows/reusable-dependabot-auto.yml@main
