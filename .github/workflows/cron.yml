---
name: CI - Cron
run-name: Continuous Integration on ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: '32 6 * * *' # set random cron
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  gh-pin-actions:
    name: Call GH Pin Actions
    permissions:
      contents: read
    uses: irishlab-io/.github/.github/workflows/reusable-gh-pin-actions.yml@main
    with:
      allowlist: "${{ github.repository_owner }}/"

  pre-commit:
    name: Call Prek
    uses: irishlab-io/.github/.github/workflows/reusable-prek.yml@main
    with:
      skips: "actionlint,ggshield,pin-github-action"

  secret:
    needs:
      - gh-pin-actions
      - pre-commit
    name: Call Git Guardian
    uses: irishlab-io/.github/.github/workflows/reusable-gitguardian.yml@main
    secrets:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  bitwarden-rotate:
    name: Rotate Bitwarden Secrets
    permissions: {}
    uses: irishlab-io/.github/.github/workflows/reusable-bitwarden-secret-rotation.yml@main
    secrets:
      BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
      IRISHLAB_BOT_APP_ID: ${{ secrets.IRISHLAB_BOT_APP_ID }}
      IRISHLAB_BOT_PRIVATE_KEY: ${{ secrets.IRISHLAB_BOT_PRIVATE_KEY }}
