---
name: CI - Main
run-name: Continuous Integration on ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  pre-commit:
    name: Call Prek
    uses: irishlab-io/.github/.github/workflows/reusable-prek.yml@main
    with:
      skips: "actionlint,ggshield,pin-github-action"

  secret:
    needs:
      - pre-commit
    name: Call Git Guardian
    uses: irishlab-io/.github/.github/workflows/reusable-gitguardian.yml@main
    secrets:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  hello-world:
    name: Call Hello World
    uses: irishlab-io/.github/.github/workflows/reusable-hello-world.yml@main
    secrets: inherit

  detect-repo-changes:
    name: Detect Repository Config Changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      config_files: ${{ steps.detect.outputs.config_files }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed repo config files
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'repos/*.yml' 'repos/*.yaml' \
            | grep -v 'repos/_template.yml' || true)
          if [ -n "${CHANGED}" ]; then
            FILES=$(echo "${CHANGED}" | tr '\n' ' ' | xargs)
            echo "config_files=${FILES}" >> "${GITHUB_OUTPUT}"
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changed repo config files: ${FILES}"
          else
            echo "config_files=" >> "${GITHUB_OUTPUT}"
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No repo config changes detected."
          fi
        shell: bash

  create-repositories:
    name: Call Repository Creation
    needs: detect-repo-changes
    if: needs.detect-repo-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
    uses: irishlab-io/.github/.github/workflows/reusable-repo-create.yml@main
    with:
      config_files: ${{ needs.detect-repo-changes.outputs.config_files }}
    secrets: inherit
