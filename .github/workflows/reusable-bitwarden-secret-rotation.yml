---
name: Reusable - Bitwarden Secret Rotation

on: # yamllint disable-line rule:truthy
  workflow_call:
    secrets:
      BW_ACCESS_TOKEN:
        required: true
        description: Bitwarden Secrets Manager machine account access token
      IRISHLAB_BOT_APP_ID:
        required: true
        description: GitHub App ID for bot authentication
      IRISHLAB_BOT_PRIVATE_KEY:
        required: true
        description: GitHub App private key for bot authentication

jobs:
  rotate:
    name: Rotate All Bitwarden Secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: "${{ secrets.IRISHLAB_BOT_APP_ID }}"
          private-key: "${{ secrets.IRISHLAB_BOT_PRIVATE_KEY }}"
          owner: "${{ github.repository_owner }}"

      - name: Install Bitwarden Secrets Manager CLI
        env:
          BWS_VERSION: "2.0.0"
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws-bin
          sudo install -m 755 /tmp/bws-bin/bws /usr/local/bin/bws
          bws --version
        shell: bash

      - name: Sync all declared Bitwarden secrets to GitHub
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          synced=0
          skipped=0
          sync_failures=()

          echo "Scanning repos/*.yml for declared Bitwarden secrets..."

          for config_file in repos/*.yml repos/*.yaml; do
            [[ ! -f "${config_file}" ]] && continue
            [[ "$(basename "${config_file}")" == "_template.yml" ]] && continue

            repo_name=$(yq '.name' "${config_file}" 2>/dev/null | tr -d '"' | xargs)
            [[ -z "${repo_name}" || "${repo_name}" == "null" ]] && continue

            # Read org-level secrets (format: "<bitwarden-uuid> > GITHUB_SECRET_NAME")
            mapfile -t org_secrets < <(yq '.secrets.org // [] | .[]' "${config_file}" 2>/dev/null | tr -d '"')
            # Read repo-level secrets
            mapfile -t repo_secrets < <(yq '.secrets.repo // [] | .[]' "${config_file}" 2>/dev/null | tr -d '"')

            if [[ ${#org_secrets[@]} -eq 0 && ${#repo_secrets[@]} -eq 0 ]]; then
              skipped=$((skipped + 1))
              continue
            fi

            echo ""
            echo "============================================================"
            echo "Rotating secrets for: ${ORG}/${repo_name}"

            for secret_mapping in "${org_secrets[@]}"; do
              secret_mapping="${secret_mapping#"${secret_mapping%%[! ]*}"}"
              secret_mapping="${secret_mapping%"${secret_mapping##*[! ]}"}"
              [[ -z "${secret_mapping}" ]] && continue

              bw_id=$(echo "${secret_mapping}" | awk -F' > ' '{print $1}')
              gh_name=$(echo "${secret_mapping}" | awk -F' > ' '{print $2}')

              if [[ -z "${bw_id}" || -z "${gh_name}" ]]; then
                echo "  ::warning::Skipping malformed org secret entry: ${secret_mapping}"
                continue
              fi

              echo "  Fetching Bitwarden secret ${bw_id} → org secret ${gh_name}..."
              bws_stderr=$(mktemp)
              secret_value=$(bws secret get "${bw_id}" 2>"${bws_stderr}" | jq -r '.value' || true)
              if [[ -z "${secret_value}" || "${secret_value}" == "null" ]]; then
                bws_error=$(<"${bws_stderr}")
                echo "  ::warning::Could not retrieve Bitwarden secret ${bw_id}: ${bws_error:-unknown error}"
                sync_failures+=("${gh_name} (org)")
                rm -f "${bws_stderr}"
                continue
              fi
              rm -f "${bws_stderr}"
              printf '%s' "${secret_value}" | gh secret set "${gh_name}" --org "${ORG}"
              echo "  Org secret ${gh_name} updated."
              synced=$((synced + 1))
            done

            for secret_mapping in "${repo_secrets[@]}"; do
              secret_mapping="${secret_mapping#"${secret_mapping%%[! ]*}"}"
              secret_mapping="${secret_mapping%"${secret_mapping##*[! ]}"}"
              [[ -z "${secret_mapping}" ]] && continue

              bw_id=$(echo "${secret_mapping}" | awk -F' > ' '{print $1}')
              gh_name=$(echo "${secret_mapping}" | awk -F' > ' '{print $2}')

              if [[ -z "${bw_id}" || -z "${gh_name}" ]]; then
                echo "  ::warning::Skipping malformed repo secret entry: ${secret_mapping}"
                continue
              fi

              echo "  Fetching Bitwarden secret ${bw_id} → repo secret ${gh_name}..."
              bws_stderr=$(mktemp)
              secret_value=$(bws secret get "${bw_id}" 2>"${bws_stderr}" | jq -r '.value' || true)
              if [[ -z "${secret_value}" || "${secret_value}" == "null" ]]; then
                bws_error=$(<"${bws_stderr}")
                echo "  ::warning::Could not retrieve Bitwarden secret ${bw_id}: ${bws_error:-unknown error}"
                sync_failures+=("${gh_name} (repo) for ${repo_name}")
                rm -f "${bws_stderr}"
                continue
              fi
              rm -f "${bws_stderr}"
              printf '%s' "${secret_value}" | gh secret set "${gh_name}" --repo "${ORG}/${repo_name}"
              echo "  Repo secret ${gh_name} updated for ${repo_name}."
              synced=$((synced + 1))
            done

            echo "  Done."
          done

          echo ""
          echo "=== Rotation Summary ==="
          echo "Secrets synced : ${synced}"
          echo "Repos skipped  : ${skipped} (no secrets declared)"
          if [[ ${#sync_failures[@]} -gt 0 ]]; then
            echo "Failed         : ${#sync_failures[@]}"
            for f in "${sync_failures[@]}"; do echo "  - ${f}"; done
            echo "::error::Failed to rotate ${#sync_failures[@]} secret(s)"
            exit 1
          fi
          echo "Rotation complete."
        shell: bash
